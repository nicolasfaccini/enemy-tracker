<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de spawn de enemigos</title>
<style>
  :root {
    --bg: #14151a;
    --card-bg: #1d1f26;
    --border: #2c2e37;
    --text: #e8e8ea;
    --text-secondary: #9a9ba3;
    --green-bg: #163a2b;
    --green-border: #2a6b4a;
    --green-text: #6fe3a3;
    --red-bg: #3a1a1a;
    --red-border: #6b2a2a;
    --red-text: #e37070;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px 16px 60px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    text-align: center;
  }
  p.subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    margin: 0 0 24px;
  }
  .container {
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    align-items: start;
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
  }
  .card-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .reset-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text);
  }
  .planet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
  }
  .planet-btn {
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    border: 1px solid var(--green-border);
    background: var(--green-bg);
    color: var(--green-text);
    text-align: center;
    line-height: 1.3;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .planet-btn:active {
    transform: scale(0.97);
  }
  .planet-btn.clicked {
    border-color: var(--red-border);
    background: var(--red-bg);
    color: var(--red-text);
  }
  .reset-all-wrap {
    text-align: center;
    margin-top: 8px;
  }
  .reset-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .reset-all-btn:hover {
    color: var(--text);
    border-color: var(--text-secondary);
  }
</style>
</head>
<body>
  <h1>Tracker de spawn de enemigos</h1>
  <p class="subtitle">Tocá un planeta cuando matás el bicho ahi. Se sincroniza en vivo con todos los que tengan este link. Cuando se completan todos los de un sistema, se reinicia solo.</p>
  <div class="container" id="app"></div>
  <div class="reset-all-wrap">
    <button class="reset-all-btn" onclick="resetAll()">Reiniciar todo</button>
  </div>

<script>
const SYSTEMS = [
  { name: "Vega", planets: ["Kalabesh","Lyris","Aurora","Axiom"] },
  { name: "Antares", planets: ["Terasa","Lustra"] },
  { name: "Gemini", planets: ["Comercio Central","Prosperus","Technatoria"] },
  { name: "Mizar", planets: ["Baumar","Molikar"] },
  { name: "Sol", planets: ["Tierra","Marte","Luna","Tierra en Conflicto"] },
  { name: "Draconis", planets: ["Gazica","Colmena"] },
  { name: "Tauceti / Oort", planets: ["Venar","Calon","Erebos"] }
];

const BLOB_URL = "https://jsonblob.com/api/jsonBlob/019f2f9a-692c-74f9-b785-8992f77491f8";
const POLL_MS = 3000;
let state = null;

function defaultState() {
  const s = {};
  SYSTEMS.forEach(sys => { s[sys.name] = {}; sys.planets.forEach(p => s[sys.name][p] = false); });
  return s;
}

async function fetchRemote() {
  const res = await fetch(BLOB_URL, { cache: "no-store" });
  if (!res.ok) throw new Error("fetch failed");
  return res.json();
}

async function pushRemote() {
  try {
    await fetch(BLOB_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state)
    });
  } catch (e) {}
}

async function load() {
  try {
    state = await fetchRemote();
  } catch (e) {
    state = defaultState();
  }
  render();
  setInterval(pollRemote, POLL_MS);
}

async function pollRemote() {
  try {
    const remote = await fetchRemote();
    if (JSON.stringify(remote) !== JSON.stringify(state)) {
      state = remote;
      render();
    }
  } catch (e) {}
}

function toggle(sysName, planet) {
  state[sysName][planet] = !state[sysName][planet];
  const allDone = SYSTEMS.find(s => s.name === sysName).planets.every(p => state[sysName][p]);
  render();
  pushRemote();
  if (allDone) {
    setTimeout(() => {
      SYSTEMS.find(s => s.name === sysName).planets.forEach(p => state[sysName][p] = false);
      render();
      pushRemote();
    }, 400);
  }
}

function resetSystem(sysName) {
  SYSTEMS.find(s => s.name === sysName).planets.forEach(p => state[sysName][p] = false);
  render();
  pushRemote();
}

function resetAll() {
  state = defaultState();
  render();
  pushRemote();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  SYSTEMS.forEach(sys => {
    const clickedCount = sys.planets.filter(p => state[sys.name][p]).length;
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = sys.name;

    const statusWrap = document.createElement("div");
    statusWrap.className = "card-status";

    const status = document.createElement("span");
    status.textContent = clickedCount + " / " + sys.planets.length + " muertos";

    const resetBtn = document.createElement("button");
    resetBtn.className = "reset-btn";
    resetBtn.textContent = "reiniciar";
    resetBtn.onclick = () => resetSystem(sys.name);

    statusWrap.appendChild(status);
    statusWrap.appendChild(resetBtn);
    header.appendChild(title);
    header.appendChild(statusWrap);
    card.appendChild(header);

    const grid = document.createElement("div");
    grid.className = "planet-grid";

    sys.planets.forEach(p => {
      const clicked = state[sys.name][p];
      const btn = document.createElement("button");
      btn.className = "planet-btn" + (clicked ? " clicked" : "");
      btn.textContent = p;
      btn.onclick = () => toggle(sys.name, p);
      grid.appendChild(btn);
    });

    card.appendChild(grid);
    app.appendChild(card);
  });
}

load();
</script>
</body>
</html>
