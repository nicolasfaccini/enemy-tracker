<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de spawn de enemigos</title>
<style>
  :root {
    --bg: #14151a;
    --card-bg: #1d1f26;
    --border: #2c2e37;
    --text: #e8e8ea;
    --text-secondary: #9a9ba3;
    --green-bg: #163a2b;
    --green-border: #2a6b4a;
    --green-text: #6fe3a3;
    --red-bg: #3a1a1a;
    --red-border: #6b2a2a;
    --red-text: #e37070;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px 16px 60px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    text-align: center;
  }
  p.subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    margin: 0 0 24px;
  }
  .container {
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    align-items: start;
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
  }
  .card-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .reset-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text);
  }
  .planet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
  }
  .planet-btn {
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    border: 1px solid var(--green-border);
    background: var(--green-bg);
    color: var(--green-text);
    text-align: center;
    line-height: 1.3;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .planet-btn:active {
    transform: scale(0.97);
  }
  .planet-btn.clicked {
    border-color: var(--red-border);
    background: var(--red-bg);
    color: var(--red-text);
  }
  .planet-ts {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.7;
    margin-top: 2px;
  }
  .planet-badge {
    font-size: 10px;
    font-weight: 700;
    color: #e3c56f;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .reset-all-wrap {
    text-align: center;
    margin-top: 8px;
  }
  .reset-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .reset-all-btn:hover {
    color: var(--text);
    border-color: var(--text-secondary);
  }
</style>
</head>
<body>
  <h1>Tracker de spawn de enemigos</h1>
  <p class="subtitle">Tocá un planeta cuando matás el bicho ahi. Cuando se completan todos los de un sistema, se reinicia solo.</p>
  <div class="container" id="app"></div>
  <div class="reset-all-wrap">
    <button class="reset-all-btn" onclick="resetAll()">Reiniciar todo</button>
  </div>

<script>
const SYSTEMS = [
  { name: "Vega", planets: ["Kalabesh","Lyris","Aurora","Axiom"] },
  { name: "Antares", planets: ["Terasa","Lustra"] },
  { name: "Gemini", planets: ["Comercio Central","Prosperus","Technatoria"] },
  { name: "Mizar", planets: ["Baumar","Molikar"] },
  { name: "Sol", planets: ["Tierra","Marte","Luna","Tierra en Conflicto"] },
  { name: "Draconis", planets: ["Gazica","Colmena"] },
  { name: "Tauceti / Oort", planets: ["Venar","Calon","Erebos"] }
];

const STORAGE_KEY = "enemy-tracker-state-v3";
let state = {};

function defaultState() {
  const planets = {};
  const order = {};
  SYSTEMS.forEach(sys => {
    planets[sys.name] = {};
    sys.planets.forEach(p => planets[sys.name][p] = { clicked: false, lastAt: null });
    order[sys.name] = { current: [], last: [] };
  });
  return { planets, order };
}

function predictedNext(sysName) {
  const last = state.order[sysName].last;
  if (!last || last.length === 0) return null;
  return last.find(p => !state.planets[sysName][p].clicked) || null;
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
  } catch (e) {
    state = defaultState();
  }
  render();
  setInterval(render, 60000);
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

function formatElapsed(ts) {
  if (!ts) return null;
  const min = Math.floor((Date.now() - ts) / 60000);
  if (min < 1) return "recién";
  if (min < 60) return "hace " + min + "m";
  const hr = Math.floor(min / 60);
  if (hr < 24) return "hace " + hr + "h";
  const day = Math.floor(hr / 24);
  return "hace " + day + "d";
}

function toggle(sysName, planet) {
  const cell = state.planets[sysName][planet];
  const order = state.order[sysName];
  cell.clicked = !cell.clicked;
  if (cell.clicked) {
    cell.lastAt = Date.now();
    if (!order.current.includes(planet)) order.current.push(planet);
  } else {
    order.current = order.current.filter(p => p !== planet);
  }
  const allDone = SYSTEMS.find(s => s.name === sysName).planets.every(p => state.planets[sysName][p].clicked);
  save();
  render();
  if (allDone) {
    setTimeout(() => {
      order.last = order.current.slice();
      order.current = [];
      SYSTEMS.find(s => s.name === sysName).planets.forEach(p => state.planets[sysName][p].clicked = false);
      save();
      render();
    }, 400);
  }
}

function resetSystem(sysName) {
  SYSTEMS.find(s => s.name === sysName).planets.forEach(p => state.planets[sysName][p].clicked = false);
  state.order[sysName].current = [];
  save();
  render();
}

function resetAll() {
  state = defaultState();
  save();
  render();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  SYSTEMS.forEach(sys => {
    const clickedCount = sys.planets.filter(p => state.planets[sys.name][p].clicked).length;
    const predicted = predictedNext(sys.name);
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = sys.name;

    const statusWrap = document.createElement("div");
    statusWrap.className = "card-status";

    const status = document.createElement("span");
    status.textContent = clickedCount + " / " + sys.planets.length + " muertos";

    const resetBtn = document.createElement("button");
    resetBtn.className = "reset-btn";
    resetBtn.textContent = "reiniciar";
    resetBtn.onclick = () => resetSystem(sys.name);

    statusWrap.appendChild(status);
    statusWrap.appendChild(resetBtn);
    header.appendChild(title);
    header.appendChild(statusWrap);
    card.appendChild(header);

    const grid = document.createElement("div");
    grid.className = "planet-grid";

    sys.planets.forEach(p => {
      const cell = state.planets[sys.name][p];
      const btn = document.createElement("button");
      btn.className = "planet-btn" + (cell.clicked ? " clicked" : "");
      btn.onclick = () => toggle(sys.name, p);

      const nameEl = document.createElement("div");
      nameEl.textContent = p;
      btn.appendChild(nameEl);

      const elapsed = formatElapsed(cell.lastAt);
      if (elapsed) {
        const tsEl = document.createElement("div");
        tsEl.className = "planet-ts";
        tsEl.textContent = elapsed;
        btn.appendChild(tsEl);
      }

      if (!cell.clicked && p === predicted) {
        const badgeEl = document.createElement("div");
        badgeEl.className = "planet-badge";
        badgeEl.textContent = "◆ probable próximo";
        btn.appendChild(badgeEl);
      }

      grid.appendChild(btn);
    });

    card.appendChild(grid);
    app.appendChild(card);
  });
}

load();
</script>

</body>
</html>
